name: Security Audit

# Fails the build when a *production* dependency has a known high or critical
# advisory — that's the code we actually ship and run. Dev/build/test tooling
# (vite, esbuild, vitest) is audited too, but only for visibility: it never
# reaches production, so its advisories don't block a deploy.
# Runs on every push/PR to main, and weekly so newly-disclosed CVEs are caught
# even when no code changed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Mondays at 06:00 UTC

permissions:
  contents: read

jobs:
  audit:
    name: npm audit (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [server, client]
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.package }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies (fail on high/critical)
        run: npm audit --omit=dev --audit-level=high

      - name: Audit all dependencies (informational — never blocks)
        if: always()
        run: npm audit || true

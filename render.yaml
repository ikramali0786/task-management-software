services:
  # ─────────────────────────────────────────────
  # Backend — Node.js + Express + Socket.io
  # ─────────────────────────────────────────────
  - type: web
    name: taskflow-server
    env: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false           # You set this in the Render dashboard
      - key: JWT_SECRET
        generateValue: true   # Render auto-generates a secure random value
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false           # Set this AFTER the frontend deploys

  # ─────────────────────────────────────────────
  # Frontend — React + Vite (Static Site)
  # ─────────────────────────────────────────────
  - type: web
    name: taskflow-client
    env: static
    region: oregon
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false           # Set to: https://taskflow-server-XXXX.onrender.com/api
      - key: VITE_SOCKET_URL
        sync: false           # Set to: https://taskflow-server-XXXX.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html   # SPA fallback — required for React Router

services:
  # ─────────────────────────────────────────────
  # Backend — Node.js + Express + Socket.io
  # ─────────────────────────────────────────────
  - type: web
    name: taskflow-server
    env: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false           # You set this in the Render dashboard
      - key: JWT_SECRET
        generateValue: true   # Render auto-generates a secure random value
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false           # Set this AFTER the frontend deploys
      - key: ENCRYPTION_SECRET
        generateValue: true   # Auto-generated secret for AES-256 API key encryption

      # ── Cloudflare R2 file storage ──────────────────────────────────────
      - key: R2_ACCOUNT_ID
        value: 5fdf59211fb8e0d2a8eb56123d1f2d85
      - key: R2_BUCKET_NAME
        value: taskflow
      - key: R2_ACCESS_KEY_ID
        sync: false           # R2 API token → Access Key ID
      - key: R2_SECRET_ACCESS_KEY
        sync: false           # R2 API token → Secret Access Key
      - key: R2_PUBLIC_URL
        sync: false           # e.g. https://pub-XXXX.r2.dev (from bucket public access settings)

  # ─────────────────────────────────────────────
  # Frontend — React + Vite (Static Site)
  # ─────────────────────────────────────────────
  - type: web
    name: taskflow-client
    env: static
    region: oregon
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false           # Set to: https://taskflow-server-XXXX.onrender.com/api
      - key: VITE_SOCKET_URL
        sync: false           # Set to: https://taskflow-server-XXXX.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html   # SPA fallback — required for React Router
